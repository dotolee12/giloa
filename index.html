<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>New Daedongyeojido - Project Giloa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    #map-wrap { position: absolute; inset: 0; z-index: 1; }
    #map { width: 100%; height: 100%; filter: grayscale(0.12) contrast(1.04); }

    #fog-canvas,
    #age-canvas,
    #stay-canvas {
        position: absolute;
        inset: 0;
        pointer-events: none;
    }
    #fog-canvas  { z-index: 400; }
    #age-canvas  { z-index: 401; }
    #stay-canvas { z-index: 402; }

    #top-bar {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1000;
        gap: 12px;
    }

    #ham-btn {
        width: 48px;
        height: 48px;
        flex-shrink: 0;
        background: rgba(30, 30, 45, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 5px;
        cursor: pointer;
        backdrop-filter: blur(8px);
    }

    .hline {
        width: 20px;
        height: 2px;
        background: #fff;
        border-radius: 1px;
    }

    #rec-status-box {
        padding: 9px 16px;
        background: rgba(30, 30, 45, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        color: rgba(255, 255, 255, 0.55);
        font-size: 13px;
        font-weight: 600;
        backdrop-filter: blur(8px);
        transition: 0.25s ease;
        white-space: nowrap;
    }

    #rec-status-box.recording {
        background: rgba(255, 60, 60, 0.18);
        border-color: rgba(255, 80, 80, 0.55);
        color: #ff8888;
    }

    #sidebar {
        position: fixed;
        top: 0;
        left: -300px;
        width: 300px;
        height: 100%;
        background: rgba(20, 20, 30, 0.95);
        backdrop-filter: blur(15px);
        z-index: 2000;
        transition: 0.3s;
        padding: 25px;
        color: white;
        box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        overflow-y: auto;
    }

    #sidebar.open { left: 0; }

    #sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        z-index: 1999;
    }

    #sidebar-overlay.show { display: block; }

    .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }

    .sidebar-header h2 { font-size: 18px; color: #4db8ff; }

    .memory-item {
        background: rgba(255, 255, 255, 0.05);
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 10px;
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .memory-item:hover {
        border-color: #4db8ff;
        background: rgba(255, 255, 255, 0.1);
    }

    .item-name { display: block; font-weight: bold; margin-bottom: 6px; }
    .item-date { display: block; font-size: 12px; color: rgba(255, 255, 255, 0.6); }

    #controls {
        position: absolute;
        bottom: 110px;
        right: 20px;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .btn {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(30, 30, 45, 0.82);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        font-size: 20px;
        color: #fff;
        backdrop-filter: blur(8px);
    }

    #rec-btn.recording .icon-rec { display: none; }
    #rec-btn.recording .icon-stop { display: block; }
    #rec-btn .icon-stop { display: none; }

    .icon-stop { width: 14px; height: 14px; background: #ff4444; border-radius: 2px; }
    .icon-rec  { width: 14px; height: 14px; background: #ff4444; border-radius: 50%; }
    .icon-loc  {
        width: 12px;
        height: 12px;
        background: #4db8ff;
        border-radius: 50%;
        box-shadow: 0 0 10px #4db8ff;
    }

    #hud {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 90px;
        background: rgba(20, 20, 30, 0.85);
        display: flex;
        align-items: center;
        padding: 0 30px;
        z-index: 999;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
    }

    .stat { flex: 1; }
    .label { font-size: 11px; color: rgba(255, 255, 255, 0.4); font-weight: bold; }
    .value { font-size: 20px; color: #fff; font-weight: 600; margin-top: 4px; }
    .value span { margin-left: 2px; }

    .player-marker {
        width: 18px; height: 18px;
        background: #4db8ff;
        border: 3px solid rgba(255, 255, 255, 0.95);
        border-radius: 50%;
        box-shadow: 0 0 14px rgba(77, 184, 255, 0.95);
    }

    .memory-marker {
        width: 28px; height: 28px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #ffd84d;
        font-size: 22px;
        text-shadow: 0 0 10px rgba(255, 216, 77, 0.55);
    }
</style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <h2>나의 기록들</h2>
        <span onclick="toggleSidebar(false)" style="cursor:pointer;">✕</span>
    </div>
    <div id="memory-list-container">
        <p style="opacity:0.5;text-align:center;margin-top:50px;">아직 기록이 없습니다.</p>
    </div>
</div>
<div id="sidebar-overlay" onclick="toggleSidebar(false)"></div>

<div id="map-wrap"><div id="map"></div></div>
<canvas id="fog-canvas"></canvas>
<canvas id="age-canvas"></canvas>
<canvas id="stay-canvas"></canvas>

<div id="top-bar">
    <div id="ham-btn" onclick="toggleSidebar()">
        <div class="hline"></div>
        <div class="hline"></div>
        <div class="hline"></div>
    </div>
    <div id="rec-status-box">대기 중</div>
</div>

<div id="controls">
    <div id="rec-btn" class="btn" onclick="toggleRecording()">
        <div class="icon-rec"></div>
        <div class="icon-stop"></div>
    </div>
    <div id="memo-btn" class="btn" onclick="addMemory()">★</div>
    <div id="loc-btn" class="btn" onclick="centerMap()">
        <div class="icon-loc"></div>
    </div>
</div>

<div id="hud">
    <div class="stat">
        <div class="label">TOTAL DISTANCE</div>
        <div id="dist-val" class="value">0.00<span>km</span></div>
    </div>
    <div class="stat">
        <div class="label">MEMORIES</div>
        <div id="memo-val" class="value">0</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const STORAGE_KEY = "giloa-v5";
    const FOG_ALPHA = 0.80;
    const FOG_RADIUS_M = 18;
    const MIN_MOVE_M = 5;
    const SAVE_DELAY_MS = 800;
    const MAX_ACCURACY_M = 30;

    let isRecording = false;
    let currentPos = null;
    let pathCoordinates = [];
    let memories = [];
    let totalDistance = 0;
    let playerMarker = null;
    let watchId = null;
    let saveTimer = null;
    let rafId = null;

    const recBtn = document.getElementById("rec-btn");
    const recStatusBox = document.getElementById("rec-status-box");

    const map = L.map("map", { zoomControl: false, attributionControl: false })
        .setView([37.5665, 126.9780], 16);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png").addTo(map);

    const fogCanvas = document.getElementById("fog-canvas");
    const ageCanvas = document.getElementById("age-canvas");
    const stayCanvas = document.getElementById("stay-canvas");
    const fogCtx = fogCanvas.getContext("2d");
    const ageCtx = ageCanvas.getContext("2d");
    const stayCtx = stayCanvas.getContext("2d");

    function resizeCanvas() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        [fogCanvas, ageCanvas, stayCanvas].forEach((c) => {
            c.width = w;
            c.height = h;
        });
        scheduleRender();
    }

    window.addEventListener("resize", resizeCanvas);
    map.on("move zoom", scheduleRender);

    function scheduleRender() {
        if (rafId !== null) return;
        rafId = requestAnimationFrame(() => {
            rafId = null;
            render();
        });
    }

    function render() {
        renderFog();
        renderAgeTint();
        renderStayTint();
    }

    function renderFog() {
        const w = fogCanvas.width;
        const h = fogCanvas.height;
        fogCtx.clearRect(0, 0, w, h);
        fogCtx.fillStyle = `rgba(8, 10, 18, ${FOG_ALPHA})`;
        fogCtx.fillRect(0, 0, w, h);

        if (pathCoordinates.length === 0) return;

        const now = Date.now();
        fogCtx.save();
        fogCtx.globalCompositeOperation = "destination-out";

        pathCoordinates.forEach((pt, i) => {
            const ageDays = (now - pt.startTime) / 86400000;
            const brightness = Math.max(0.4, 1 - ageDays * 0.01);
            fogCtx.globalAlpha = brightness;

            const pos = map.latLngToContainerPoint(pt.latlng);
            const radius = getMetersToPixels(FOG_RADIUS_M);

            fogCtx.beginPath();
            fogCtx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
            fogCtx.fill();

            if (i > 0) {
                const prev = map.latLngToContainerPoint(pathCoordinates[i - 1].latlng);
                fogCtx.beginPath();
                fogCtx.lineWidth = radius * 1.7;
                fogCtx.lineCap = "round";
                fogCtx.lineJoin = "round";
                fogCtx.moveTo(prev.x, prev.y);
                fogCtx.lineTo(pos.x, pos.y);
                fogCtx.stroke();
            }
        });

        fogCtx.restore();
    }

    function renderAgeTint() {
        const w = ageCanvas.width;
        const h = ageCanvas.height;
        ageCtx.clearRect(0, 0, w, h);

        if (pathCoordinates.length === 0) return;

        const now = Date.now();

        ageCtx.save();
        ageCtx.beginPath();
        pathCoordinates.forEach((pt, i) => {
            const pos = map.latLngToContainerPoint(pt.latlng);
            const radius = getMetersToPixels(FOG_RADIUS_M);
            ageCtx.moveTo(pos.x + radius, pos.y);
            ageCtx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);

            if (i > 0) {
                const prev = map.latLngToContainerPoint(pathCoordinates[i - 1].latlng);
                const dx = pos.x - prev.x;
                const dy = pos.y - prev.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                const nx = -dy / len * radius * 0.85;
                const ny = dx / len * radius * 0.85;
                ageCtx.moveTo(prev.x + nx, prev.y + ny);
                ageCtx.lineTo(pos.x + nx, pos.y + ny);
                ageCtx.lineTo(pos.x - nx, pos.y - ny);
                ageCtx.lineTo(prev.x - nx, prev.y - ny);
                ageCtx.closePath();
            }
        });
        ageCtx.clip();

        pathCoordinates.forEach((pt, i) => {
            const ageDays = (now - pt.startTime) / 86400000;
            const color = getAgeColor(ageDays);
            if (!color) return;

            const pos = map.latLngToContainerPoint(pt.latlng);
            const radius = getMetersToPixels(FOG_RADIUS_M);

            ageCtx.fillStyle = color;
            ageCtx.strokeStyle = color;

            ageCtx.beginPath();
            ageCtx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
            ageCtx.fill();

            if (i > 0) {
                const prev = map.latLngToContainerPoint(pathCoordinates[i - 1].latlng);
                ageCtx.beginPath();
                ageCtx.lineWidth = radius * 1.15;
                ageCtx.lineCap = "round";
                ageCtx.lineJoin = "round";
                ageCtx.moveTo(prev.x, prev.y);
                ageCtx.lineTo(pos.x, pos.y);
                ageCtx.stroke();
            }
        });

        ageCtx.restore();
    }

    function renderStayTint() {
        const w = stayCanvas.width;
        const h = stayCanvas.height;
        stayCtx.clearRect(0, 0, w, h);

        if (pathCoordinates.length === 0) return;

        stayCtx.save();
        stayCtx.beginPath();
        pathCoordinates.forEach((pt, i) => {
            const pos = map.latLngToContainerPoint(pt.latlng);
            const radius = getMetersToPixels(FOG_RADIUS_M);
            stayCtx.moveTo(pos.x + radius, pos.y);
            stayCtx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);

            if (i > 0) {
                const prev = map.latLngToContainerPoint(pathCoordinates[i - 1].latlng);
                const dx = pos.x - prev.x;
                const dy = pos.y - prev.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                const nx = -dy / len * radius * 0.85;
                const ny = dx / len * radius * 0.85;
                stayCtx.moveTo(prev.x + nx, prev.y + ny);
                stayCtx.lineTo(pos.x + nx, pos.y + ny);
                stayCtx.lineTo(pos.x - nx, pos.y - ny);
                stayCtx.lineTo(prev.x - nx, prev.y - ny);
                stayCtx.closePath();
            }
        });
        stayCtx.clip();

        pathCoordinates.forEach((pt) => {
            const stayMin = (pt.endTime - pt.startTime) / 60000;
            const color = getStayColor(stayMin);
            if (!color) return;

            const pos = map.latLngToContainerPoint(pt.latlng);
            const radius = getMetersToPixels(FOG_RADIUS_M + 2);
            const grad = stayCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, radius);

            grad.addColorStop(0, color.center);
            grad.addColorStop(0.65, color.mid);
            grad.addColorStop(1, color.edge);

            stayCtx.beginPath();
            stayCtx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
            stayCtx.fillStyle = grad;
            stayCtx.fill();
        });

        stayCtx.restore();
    }

    function getAgeColor(ageDays) {
        if (ageDays < 60) return null;
        if (ageDays < 1000) return "rgba(60, 170, 80, 0.18)";
        if (ageDays < 3000) return "rgba(214, 176, 55, 0.18)";
        if (ageDays < 5000) return "rgba(130, 92, 55, 0.18)";
        return "rgba(95, 95, 95, 0.14)";
    }

    function getStayColor(stayMin) {
        if (stayMin >= 10 && stayMin < 30) {
            return {
                center: "rgba(135,206,235,0.22)",
                mid: "rgba(135,206,235,0.14)",
                edge: "rgba(135,206,235,0)"
            };
        }
        if (stayMin >= 30 && stayMin < 60) {
            return {
                center: "rgba(70,130,255,0.24)",
                mid: "rgba(70,130,255,0.15)",
                edge: "rgba(70,130,255,0)"
            };
        }
        if (stayMin >= 60) {
            return {
                center: "rgba(150,90,255,0.26)",
                mid: "rgba(150,90,255,0.16)",
                edge: "rgba(150,90,255,0)"
            };
        }
        return null;
    }

    function getMetersToPixels(meters) {
        const center = map.getCenter();
        const pt = map.latLngToContainerPoint(center);
        const ll2 = map.containerPointToLatLng(L.point(pt.x + 10, pt.y));
        const mpp = center.distanceTo(ll2);
        return mpp ? (meters / mpp) * 10 : 1;
    }

    function syncRecordingUI() {
        recBtn.classList.toggle("recording", isRecording);
        recStatusBox.textContent = isRecording ? "기록 중" : "대기 중";
        recStatusBox.classList.toggle("recording", isRecording);
    }

    function resetRecordingState() {
        isRecording = false;
        syncRecordingUI();
        stopTracking();
    }

    function toggleRecording() {
        if (isRecording) {
            isRecording = false;
            syncRecordingUI();
            stopTracking();
            scheduleSave();
            return;
        }

        isRecording = true;
        syncRecordingUI();
        startTracking();
    }

    function startTracking() {
        if (!navigator.geolocation) {
            alert("이 브라우저는 위치 추적을 지원하지 않습니다.");
            resetRecordingState();
            return;
        }

        if (!window.isSecureContext &&
            location.hostname !== "localhost" &&
            location.hostname !== "127.0.0.1") {
            alert("위치 추적은 HTTPS 또는 localhost에서만 동작합니다.");
            resetRecordingState();
            return;
        }

        watchId = navigator.geolocation.watchPosition(
            handlePosition,
            handleLocationError,
            { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 }
        );
    }

    function stopTracking() {
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }
    }

    function handlePosition(position) {
        const accuracy = Number(position.coords.accuracy) || Infinity;
        const latlng = L.latLng(position.coords.latitude, position.coords.longitude);
        currentPos = latlng;

        if (!playerMarker) {
            playerMarker = L.marker(latlng, {
                icon: L.divIcon({ className: "player-marker", iconSize: [18, 18] })
            }).addTo(map);
            map.setView(latlng, 16);
        } else {
            playerMarker.setLatLng(latlng);
        }

        if (!isRecording) return;

        if (accuracy > MAX_ACCURACY_M) {
            recStatusBox.textContent = `GPS 약함 (${Math.round(accuracy)}m)`;
            return;
        }

        recStatusBox.textContent = "기록 중";

        const now = Date.now();

        if (pathCoordinates.length === 0) {
            pathCoordinates.push({ latlng, startTime: now, endTime: now });
            updateStats();
            scheduleSave();
            scheduleRender();
            return;
        }

        const last = pathCoordinates[pathCoordinates.length - 1];
        const dist = latlng.distanceTo(last.latlng);

        if (dist <= MIN_MOVE_M) {
            last.endTime = now;
        } else {
            totalDistance += dist;
            pathCoordinates.push({ latlng, startTime: now, endTime: now });
        }

        updateStats();
        scheduleSave();
        scheduleRender();
    }

    function handleLocationError(err) {
        let msg = "위치 정보를 가져오지 못했습니다.";
        if (err.code === 1) msg = "위치 권한이 거부되었습니다.";
        if (err.code === 2) msg = "현재 위치를 확인할 수 없습니다.";
        if (err.code === 3) msg = "위치 요청 시간이 초과되었습니다.";
        alert(msg);
        resetRecordingState();
    }

    function updateStats() {
        document.getElementById("dist-val").innerHTML =
            (totalDistance / 1000).toFixed(2) + "<span>km</span>";
        document.getElementById("memo-val").innerText = memories.length;
    }

    function addMemory() {
        if (!currentPos) {
            alert("위치 정보를 수신 중입니다.");
            return;
        }

        const input = prompt("이 장소의 이름을 입력하세요:", "새로운 발견");
        if (input === null) return;

        const now = new Date();
        const data = {
            latlng: currentPos,
            name: escapeHtml(input.trim() || "기억의 지점"),
            time: now.getTime(),
            dateString: now.toLocaleDateString("ko-KR", {
                year: "numeric",
                month: "long",
                day: "numeric"
            })
        };

        memories.push(data);
        createMemoryMarker(data, true);
        updateMemoryList();
        updateStats();
        scheduleSave();
    }

    function createMemoryMarker(data, openPopup = false) {
        const m = L.marker(data.latlng, {
            icon: L.divIcon({ className: "memory-marker", html: "★", iconSize: [28, 28] })
        }).addTo(map)
          .bindPopup("<b>" + data.name + "</b><br><small>" + data.dateString + " 기록</small>");
        if (openPopup) m.openPopup();
    }

    function updateMemoryList() {
        const container = document.getElementById("memory-list-container");
        if (memories.length === 0) {
            container.innerHTML = '<p style="opacity:0.5;text-align:center;margin-top:50px;">아직 기록이 없습니다.</p>';
            return;
        }

        container.innerHTML = "";
        [...memories].reverse().forEach((memo) => {
            const item = document.createElement("div");
            item.className = "memory-item";
            item.innerHTML =
                '<span class="item-name">★ ' + memo.name + '</span>' +
                '<span class="item-date">' + memo.dateString + "</span>";
            item.onclick = () => {
                map.flyTo(memo.latlng, 17);
                toggleSidebar(false);
            };
            container.appendChild(item);
        });
    }

    function toggleSidebar(forceOpen) {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebar-overlay");
        const willOpen = typeof forceOpen === "boolean"
            ? forceOpen
            : !sidebar.classList.contains("open");
        sidebar.classList.toggle("open", willOpen);
        overlay.classList.toggle("show", willOpen);
    }

    function centerMap() {
        if (currentPos) map.panTo(currentPos);
    }

    function scheduleSave() {
        if (saveTimer !== null) clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
            saveTimer = null;
            persistState();
        }, SAVE_DELAY_MS);
    }

    function persistState() {
        try {
            const data = {
                pathCoordinates: pathCoordinates.map((pt) => ({
                    lat: pt.latlng.lat,
                    lng: pt.latlng.lng,
                    startTime: pt.startTime,
                    endTime: pt.endTime
                })),
                memories: memories.map((m) => ({
                    lat: m.latlng.lat,
                    lng: m.latlng.lng,
                    name: m.name,
                    time: m.time,
                    dateString: m.dateString
                })),
                totalDistance
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } catch (e) {
            console.error("저장 실패", e);
        }
    }

    function loadState() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            const saved = JSON.parse(raw);

            if (Array.isArray(saved.pathCoordinates)) {
                pathCoordinates = saved.pathCoordinates
                    .filter((p) =>
                        isFinite(p.lat) &&
                        isFinite(p.lng) &&
                        isFinite(p.startTime) &&
                        isFinite(p.endTime)
                    )
                    .map((p) => ({
                        latlng: L.latLng(p.lat, p.lng),
                        startTime: p.startTime,
                        endTime: p.endTime
                    }));
            }

            if (Array.isArray(saved.memories)) {
                memories = saved.memories
                    .filter((m) =>
                        isFinite(m.lat) &&
                        isFinite(m.lng) &&
                        typeof m.name === "string"
                    )
                    .map((m) => ({
                        latlng: L.latLng(m.lat, m.lng),
                        name: m.name,
                        time: m.time,
                        dateString: m.dateString
                    }));
            }

            if (isFinite(saved.totalDistance)) totalDistance = saved.totalDistance;
        } catch (e) {
            console.error("복원 실패", e);
        }
    }

    function renderStoredMarkers() {
        memories.forEach((m) => createMemoryMarker(m, false));
    }

    function escapeHtml(v) {
        return String(v)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    loadState();
    renderStoredMarkers();
    updateStats();
    updateMemoryList();
    syncRecordingUI();
    resizeCanvas();
    scheduleRender();
</script>
</body>
</html>
